name: Build Windows Exe

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # This tells GitHub to use the new software, killing the warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # This new step automatically downloads the compiler engine we need
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build the App (.msi installer)
      run: ./gradlew packageMsi

    - name: Upload the .msi file
      uses: actions/upload-artifact@v4
      with:
        name: Metrolist-Windows-Installer
        path: build/compose/binaries/main/msi/*.msi
